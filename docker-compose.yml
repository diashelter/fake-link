name: ${COMPOSE_PROJECT_NAME:-fake_link}

x-backend-image: &backend-image
  build:
    context: docker/php
    dockerfile: Dockerfile
    target: dev
    args:
      PHP_VERSION: ${PHP_VERSION:-8.4.23}
      COMPOSER_VERSION: ${COMPOSER_VERSION:-2.10.2}
  volumes:
    - ./backend:/var/www/html
  env_file:
    - path: .env
      required: false
  environment:
    APP_NAME: Fake Link
    APP_URL: ${APP_URL:-https://app.localhost}
    SHORT_HOST: ${SHORT_HOST:-go.localhost}
    DB_CONNECTION: pgsql
    DB_HOST: postgres
    DB_PORT: 5432
    DB_DATABASE: ${POSTGRES_DB:-fake_link}
    DB_USERNAME: ${POSTGRES_USER:-fake_link}
    DB_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    CACHE_STORE: redis
    SESSION_DRIVER: redis
    QUEUE_CONNECTION: redis
    REDIS_CLIENT: phpredis
    REDIS_HOST: redis-ephemeral
    REDIS_PORT: 6379
    REDIS_QUEUE_HOST: redis-queue
    REDIS_QUEUE_PORT: 6379
  stop_grace_period: 30s
  stop_signal: SIGTERM

services:
  postgres:
    image: postgres:${POSTGRES_VERSION:-18.4}-bookworm
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fake_link}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      POSTGRES_DB: ${POSTGRES_DB:-fake_link}
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis-ephemeral:
    image: redis:${REDIS_VERSION:-8.8.0}
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    volumes:
      - ./docker/redis/ephemeral.conf:/usr/local/etc/redis/redis.conf:ro
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  redis-queue:
    image: redis:${REDIS_VERSION:-8.8.0}
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    volumes:
      - ./docker/redis/queue.conf:/usr/local/etc/redis/redis.conf:ro
      - redis_queue_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  backend:
    <<: *backend-image
    depends_on:
      postgres:
        condition: service_healthy
      redis-ephemeral:
        condition: service_healthy
      redis-queue:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "SCRIPT_NAME=/ping SCRIPT_FILENAME=/ping REQUEST_METHOD=GET cgi-fcgi -bind -connect 127.0.0.1:9000 || exit 1",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

  scheduler:
    <<: *backend-image
    command: ["php", "artisan", "schedule:work"]
    depends_on:
      postgres:
        condition: service_healthy
      redis-queue:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pgrep -f 'artisan schedule:work' >/dev/null || exit 1",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  analytics-worker:
    <<: *backend-image
    command:
      - php
      - artisan
      - queue:work
      - redis
      - --queue=analytics
      - --sleep=1
      - --timeout=120
      - --max-jobs=1000
      - --max-time=3600
    depends_on:
      postgres:
        condition: service_healthy
      redis-queue:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pgrep -f 'artisan queue:work' >/dev/null || exit 1",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  notification-worker:
    <<: *backend-image
    command:
      - php
      - artisan
      - queue:work
      - redis
      - --queue=notifications
      - --sleep=1
      - --timeout=60
      - --max-jobs=1000
      - --max-time=3600
    depends_on:
      postgres:
        condition: service_healthy
      redis-queue:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pgrep -f 'artisan queue:work' >/dev/null || exit 1",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  frontend:
    build:
      context: .
      dockerfile: docker/node/Dockerfile
      target: dev
      args:
        NODE_VERSION: ${NODE_VERSION:-24.18.0}
        PNPM_VERSION: ${PNPM_VERSION:-11.15.1}
        NEXT_VERSION: ${NEXT_VERSION:-16.2.11}
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      NODE_ENV: development
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -f http://127.0.0.1:3000/health || exit 1",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

  nginx:
    build:
      context: ./docker/nginx
      dockerfile: Dockerfile
      args:
        NGINX_VERSION: ${NGINX_VERSION:-1.30.4}
    ports:
      - "${NGINX_HTTPS_PORT:-443}:443"
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fk https://127.0.0.1/health -H 'Host: app.localhost' && curl -fk https://127.0.0.1/health -H 'Host: go.localhost'",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Profile marker for CI isolation (DOCKER-19). Datastore host ports stay in
  # docker-compose.dev.yml only; `make test` / --profile test use the base file.
  test-runner:
    profiles: ["test"]
    image: busybox:1.37
    command: ["true"]
    restart: "no"

volumes:
  postgres_data:
    name: ${COMPOSE_PROJECT_NAME:-fake_link}_postgres_data
  redis_queue_data:
    name: ${COMPOSE_PROJECT_NAME:-fake_link}_redis_queue_data
  frontend_node_modules:
    name: ${COMPOSE_PROJECT_NAME:-fake_link}_frontend_node_modules

networks:
  default:
    name: ${COMPOSE_PROJECT_NAME:-fake_link}_network
