server {
    listen 80;
    server_name app.localhost;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name app.localhost;

    ssl_certificate     /etc/nginx/certs/app.localhost.crt;
    ssl_certificate_key /etc/nginx/certs/app.localhost.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    location = /health {
        limit_except GET {
            deny all;
        }

        include /etc/nginx/snippets/proxy-common.conf;
        proxy_pass http://frontend_upstream/health;
        proxy_http_version 1.1;
    }

    location ^~ /api/v1/ {
        include /etc/nginx/snippets/fastcgi-laravel.conf;
        fastcgi_param REQUEST_URI $request_uri;
    }

    location ^~ /docs {
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $swagger_upstream http://swagger-ui:8080;
        include /etc/nginx/snippets/proxy-common.conf;
        proxy_pass $swagger_upstream;
        proxy_http_version 1.1;
    }

    location / {
        include /etc/nginx/snippets/proxy-common.conf;
        proxy_pass http://frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}
