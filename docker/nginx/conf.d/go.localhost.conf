server {
    listen 80;
    server_name go.localhost;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name go.localhost;

    ssl_certificate     /etc/nginx/certs/go.localhost.crt;
    ssl_certificate_key /etc/nginx/certs/go.localhost.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    if ($request_method !~ ^(GET|HEAD)$) {
        return 405;
    }

    location = /health {
        include /etc/nginx/snippets/fastcgi-laravel.conf;
        fastcgi_param REQUEST_URI /health;
    }

    location = /robots.txt {
        include /etc/nginx/snippets/fastcgi-laravel.conf;
        fastcgi_param REQUEST_URI /robots.txt;
    }

    location = / {
        include /etc/nginx/snippets/fastcgi-laravel.conf;
        fastcgi_param REQUEST_URI /;
    }

    location ~ ^/[a-z0-9-]+$ {
        include /etc/nginx/snippets/fastcgi-laravel.conf;
        fastcgi_param REQUEST_URI $request_uri;
    }

    location / {
        return 404;
    }
}
